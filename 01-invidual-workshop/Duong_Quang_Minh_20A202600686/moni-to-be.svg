<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="Flow to-be của MoMo Moni">
  <defs>
    <marker id="arrow-to-be" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e" />
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #334155; }
      .small { font: 13px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .ask { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
      .action { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .safe { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 8; }
      .arrow { stroke: #0f766e; stroke-width: 2; fill: none; marker-end: url(#arrow-to-be); }
    </style>
  </defs>

  <text x="30" y="40" class="title">To-be: Moni đưa quick actions và cho sửa phân loại</text>

  <rect x="30" y="80" width="170" height="95" class="box" />
  <text x="50" y="110" class="label">User</text>
  <text x="50" y="138" class="text">Hỏi chi tiêu</text>
  <text x="50" y="158" class="text">tháng này</text>

  <path d="M200 128 L250 128" class="arrow" />

  <rect x="260" y="80" width="190" height="95" class="ask" />
  <text x="280" y="110" class="label">Moni trả lời</text>
  <text x="280" y="138" class="text">Tháng này chưa</text>
  <text x="280" y="158" class="text">có giao dịch</text>

  <path d="M450 128 L500 128" class="arrow" />

  <rect x="510" y="65" width="210" height="125" class="ask" />
  <text x="530" y="95" class="label">Quick actions</text>
  <text x="530" y="123" class="text">[Xem tháng trước]</text>
  <text x="530" y="145" class="text">[Xem 3 tháng]</text>
  <text x="530" y="167" class="text">[Xem theo nhóm]</text>

  <path d="M720 128 L770 128" class="arrow" />

  <rect x="780" y="65" width="170" height="125" class="action" />
  <text x="800" y="95" class="label">User chọn</text>
  <text x="800" y="123" class="text">Xem tháng</text>
  <text x="800" y="145" class="text">trước</text>
  <text x="800" y="167" class="small">Không cần gõ thêm</text>

  <path d="M865 190 L865 230 L760 230" class="arrow" />

  <rect x="520" y="220" width="240" height="140" class="action" />
  <text x="540" y="250" class="label">Drill-down</text>
  <text x="540" y="278" class="text">Tổng: 583.769đ</text>
  <text x="540" y="300" class="text">Số giao dịch: 2</text>
  <text x="540" y="322" class="text">Hiện danh sách giao dịch</text>
  <text x="540" y="344" class="small">và nhóm chi tiêu</text>

  <path d="M520 290 L470 290" class="arrow" />

  <rect x="250" y="220" width="220" height="140" class="action" />
  <text x="270" y="250" class="label">User thao tác</text>
  <text x="270" y="278" class="text">Xem theo nhóm</text>
  <text x="270" y="300" class="text">hoặc sửa phân loại</text>
  <text x="270" y="322" class="small">nếu thấy sai</text>

  <path d="M250 290 L200 290" class="arrow" />

  <rect x="30" y="220" width="170" height="140" class="action" />
  <text x="50" y="250" class="label">Correction</text>
  <text x="50" y="278" class="text">Moni xác nhận</text>
  <text x="50" y="300" class="text">và ghi nhớ cho</text>
  <text x="50" y="322" class="text">giao dịch tương tự</text>

  <rect x="210" y="420" width="560" height="85" class="safe" />
  <text x="235" y="452" class="label">Fallback</text>
  <text x="235" y="480" class="text">Nếu AI không đủ dữ liệu để kết luận nhóm lớn nhất, hãy hiện nguồn dữ liệu và để user drill-down.</text>
</svg>
