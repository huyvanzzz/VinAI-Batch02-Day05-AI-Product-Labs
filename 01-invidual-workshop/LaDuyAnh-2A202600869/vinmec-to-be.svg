<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">VinmecCare To-Be Flow</title>
  <desc id="desc">Proposed VinmecCare flow: symptom intake, triage questions, red flag check, specialty recommendation, booking or escalation.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fbfb; }
      .title { font: 700 30px Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #52616b; }
      .section { font: 700 14px Arial, sans-serif; fill: #0f766e; letter-spacing: 0; }
      .box { stroke-width: 2; rx: 16; }
      .user { fill: #e0f2f1; stroke: #2aa8a1; }
      .ai { fill: #eff6ff; stroke: #3b82f6; }
      .safe { fill: #ecfdf5; stroke: #10b981; }
      .risk { fill: #fff7ed; stroke: #f97316; }
      .danger { fill: #fef2f2; stroke: #ef4444; }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .text { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .small { font: 400 14px Arial, sans-serif; fill: #475569; }
      .label { font: 700 12px Arial, sans-serif; fill: #ffffff; }
      .blueTag { fill: #2563eb; rx: 10; }
      .greenTag { fill: #059669; rx: 10; }
      .orangeTag { fill: #f97316; rx: 10; }
      .redTag { fill: #ef4444; rx: 10; }
      .arrow { stroke: #64748b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .line { stroke: #d7dee8; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text class="title" x="60" y="58">Sketch To-Be - Symptom-to-Specialty Triage</text>
  <text class="subtitle" x="60" y="86">Prototype chỉ hỗ trợ chọn chuyên khoa và đặt lịch an toàn, không chẩn đoán bệnh.</text>

  <line class="line" x1="60" y1="122" x2="1140" y2="122"/>
  <text class="section" x="80" y="150">TRIAGE</text>
  <text class="section" x="424" y="150">AI DECISION</text>
  <text class="section" x="768" y="150">OUTPUT / NEXT STEP</text>

  <rect class="box user" x="80" y="178" width="280" height="118"/>
  <text class="text" x="104" y="214">1. User nhập triệu chứng</text>
  <text class="small" x="104" y="242">"Đau bụng âm ỉ 2 ngày,</text>
  <text class="small" x="104" y="264">buồn nôn nhẹ"</text>

  <line class="arrow" x1="360" y1="237" x2="420" y2="237"/>

  <rect class="box ai" x="420" y="178" width="280" height="118"/>
  <text class="text" x="444" y="214">2. AI hỏi thêm</text>
  <text class="small" x="444" y="242">Tuổi, vị trí đau, mức độ đau,</text>
  <text class="small" x="444" y="264">sốt/nôn/đi ngoài ra máu?</text>
  <rect class="blueTag" x="444" y="314" width="130" height="24"/>
  <text class="label" x="462" y="331">low-confidence</text>

  <line class="arrow" x1="700" y1="237" x2="760" y2="237"/>

  <rect class="box risk" x="760" y="178" width="280" height="118"/>
  <text class="text" x="784" y="214">3. Kiểm tra red flag</text>
  <text class="small" x="784" y="242">Đau dữ dội, sốt cao, ngất,</text>
  <text class="small" x="784" y="264">nôn liên tục, đi ngoài ra máu?</text>
  <rect class="orangeTag" x="784" y="314" width="104" height="24"/>
  <text class="label" x="802" y="331">safety gate</text>

  <line class="arrow" x1="900" y1="296" x2="900" y2="354"/>
  <line class="arrow" x1="760" y1="237" x2="700" y2="420"/>

  <rect class="box danger" x="760" y="354" width="280" height="118"/>
  <text class="text" x="784" y="390">4A. Có red flag</text>
  <text class="small" x="784" y="418">Không gợi ý đặt lịch thường.</text>
  <text class="small" x="784" y="440">Chuyển hotline/cấp cứu.</text>
  <rect class="redTag" x="784" y="490" width="110" height="24"/>
  <text class="label" x="802" y="507">failure path</text>

  <rect class="box safe" x="420" y="354" width="280" height="142"/>
  <text class="text" x="444" y="390">4B. Không có red flag</text>
  <text class="small" x="444" y="418">Gợi ý 2-3 chuyên khoa:</text>
  <text class="small" x="444" y="440">Tiêu hóa, Nội tổng quát...</text>
  <text class="small" x="444" y="462">Kèm lý do và độ tự tin.</text>
  <rect class="greenTag" x="444" y="514" width="112" height="24"/>
  <text class="label" x="462" y="531">happy path</text>

  <line class="arrow" x1="700" y1="425" x2="760" y2="584"/>

  <rect class="box safe" x="760" y="584" width="280" height="104"/>
  <text class="text" x="784" y="620">5. Đặt lịch tiếp</text>
  <text class="small" x="784" y="648">Chọn cơ sở, bác sĩ,</text>
  <text class="small" x="784" y="670">khung giờ phù hợp.</text>

  <line class="arrow" x1="420" y1="425" x2="360" y2="584"/>

  <rect class="box ai" x="80" y="584" width="280" height="104"/>
  <text class="text" x="104" y="620">Correction</text>
  <text class="small" x="104" y="648">User sửa triệu chứng, AI cập nhật</text>
  <text class="small" x="104" y="670">gợi ý và giải thích lý do đổi.</text>

  <rect class="note" x="80" y="520" width="620" height="38"/>
  <text class="small" x="104" y="544">SPEC impact: một user, một task, một AI decision, có low-confidence, red flag và correction.</text>
</svg>
